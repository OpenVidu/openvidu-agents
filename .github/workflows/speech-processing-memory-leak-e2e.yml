name: Speech Processing agent memory leak E2E tests
on:
  workflow_dispatch:
    inputs:
      ref-openvidu-agents:
        description: "Branch, tag or commit SHA to checkout in repository OpenVidu/openvidu-agents"
        required: false
        default: ""
      ref-openvidu-agents-pro:
        description: "Branch, tag or commit SHA to checkout in repository OpenVidu/openvidu-agents-pro"
        required: false
        default: ""
      ref-openvidu-local-deployment:
        description: "Branch, tag or commit SHA to checkout in repository OpenVidu/openvidu-local-deployment. Defaults to 'development'"
        type: string
        required: false
        default: "development"
      ref-openvidu:
        description: "Branch, tag or commit SHA to checkout in repository OpenVidu/openvidu. Defaults to 'master'"
        type: string
        required: false
        default: "master"
      docker-tag-agent-speech-processing:
        description: "Docker tag for all agent-speech-processing containers. If not provided, the containers will be built from the repository sources"
        type: string
        required: false
      rtc-engine:
        description: "RTC engine to use"
        type: choice
        default: "pion"
        required: true
        options:
          - mediasoup
          - pion
      ref-openvidu-pro-mediasoup:
        description: 'Branch, tag or commit SHA to checkout in repository OpenVidu/openvidu-pro-mediasoup. If "default" mediasoup-worker binary will not be compiled: artifact from latest release of OpenVidu/openvidu-pro-mediasoup will be used'
        type: string
        default: "default"
        required: true
jobs:
  test:
    uses: ./.github/workflows/speech-processing-e2e-base.yml
    secrets: inherit
    with:
      ref-openvidu-agents: ${{ inputs.ref-openvidu-agents }}
      ref-openvidu-agents-pro: ${{ inputs.ref-openvidu-agents-pro }}
      ref-openvidu-local-deployment: ${{ inputs.ref-openvidu-local-deployment }}
      ref-openvidu: ${{ inputs.ref-openvidu }}
      docker-tag-agent-speech-processing: ${{ inputs.docker-tag-agent-speech-processing }}
      rtc-engine: ${{ inputs.rtc-engine }}
      ref-openvidu-pro-mediasoup: ${{ inputs.ref-openvidu-pro-mediasoup }}
      test-npm-script: test:e2e:memory
