name: OpenVidu Agents CE Unit Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Python
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
              with:
                  python-version: "3.13"
                  cache: "pip"
            - name: Install safe-chain
              uses: OpenVidu/actions/install-safe-chain@040cbfd01320475801d7b12e33769e0d55a737a8 # v1.0.21

            - name: Install dependencies
              env:
                  # Skip Git LFS downloads (not needed for package installation)
                  GIT_LFS_SKIP_SMUDGE: "1"
              run: |
                  # Configure Git to use PAT for private repos
                  git config --global url."https://${{ secrets.OPENVIDU_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

                  # Install global dependencies
                  python -m pip install --upgrade pip
                  pip install pytest

                  # Copy livekit-plugins-vosk folder
                  rm -rf speech-processing/livekit-plugins-vosk
                  cp -r ./livekit-plugins-vosk speech-processing/livekit-plugins-vosk

                  # Install speech-processing dependencies
                  pushd speech-processing
                  pip install -r requirements-base.txt --safe-chain-skip-minimum-package-age
                  pip install -r requirements-cloud.txt --safe-chain-skip-minimum-package-age
                  pip install -r requirements-vosk.txt
                  pip install -e ../openviduagentutils/
                  popd

            - name: Run unit tests
              run: |
                  PYTHONPATH=$PWD pytest -v -ra --color=yes
