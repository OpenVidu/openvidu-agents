name: OpenVidu Agents CE Unit Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: "3.12"
                  cache: "pip"

            - name: Install dependencies
              env:
                  # Skip Git LFS downloads (not needed for package installation)
                  GIT_LFS_SKIP_SMUDGE: "1"
              run: |
                  # Configure Git to use PAT for private repos
                  git config --global url."https://${{ secrets.OPENVIDU_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

                  # Install global dependencies
                  python -m pip install --upgrade pip
                  pip install pytest

                  # Copy livekit-plugins-vosk folder
                  rm -rf speech-processing/livekit-plugins-vosk
                  cp -r ./livekit-plugins-vosk speech-processing/livekit-plugins-vosk

                  # Install speech-processing dependencies
                  pushd speech-processing
                  pip install -r requirements-base.txt
                  pip install -r requirements-cloud.txt
                  pip install -r requirements-vosk.txt
                  pip install -e ../openviduagentutils/
                  popd

            - name: Run unit tests
              run: |
                  PYTHONPATH=$PWD pytest -v -ra --color=yes
